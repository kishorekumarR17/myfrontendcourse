<!DOCTYPE html>
<html>
<head>
    <title>Login and Signup Form</title>
</head>
<center>
<body>

    <h2>Login Form</h2>

    <form>

        <label>Username:</label><br>
        <input type="text"placeholder="Enter Username"required minlength="4"maxlength="15">
        <br><br>

        <label>Password:</label><br>
        <input type="password"placeholder="Enter Password"requiredminlength="6"maxlength="12">
        <br><br>

        <input type="submit" value="Login">

    </form>

    <hr>

    <h2>Signup Form</h2>

    <form>

        <label>Full Name:</label><br>
        <input type="text"placeholder="Enter Full Name"required minlength="3"maxlength="25">
        <br><br>

        <label>Email:</label><br>
        <input type="email"placeholder="Enter Email"required>
        <br><br>

        <label>Phone Number:</label><br>
        <input type="tel"placeholder="Enter Mobile Number"requiredmin length="10"maxlength="10">
        <br><br>

        <label>Create Password:</label><br>
        <input type="password" placeholder="Create Password"required minlength="6"maxlength="15">
        <br><br>

        <label>Confirm Password:</label><br>
        <input type="password"placeholder="Confirm Password"required minlength="6"maxlength="15">
        <br><br>

        <input type="submit" value="Signup">
        <input type="reset" value="Reset">

    </form>

</body>
</center>
</html>
