<html>
    <head>
        <title>Informations</title>
    </head>
    <body>
        <section>
            <div>
                <center>
                     <h1>Course Registration Form</h1>

                 <form method="post">
                    <label>Enter the Name</label><br>
                    <input type= "text" placeholder="Your Name"><br><br>
                    <label>Enter Mobile Number</label> <br>
                    <input type="tel" required minlength="10" maxlength="10" placeholder="10 Digit Number"><br><br>
                    <label>Enter the Email address </label><br>
                    <input type="text" placeholder="Your Email Address"><br><br>
                     <label>Gender:</label><br>
                    <input type="radio" name="gender" value="Male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                    <input type="radio" name="gender" value="Other"> Other
                    <br><br>
                     <label>Date of Birth:</label><br>
                     <input type="date" name="dob"><br><br>
                     <label>Address:</label><br>
                     <input type="text" placeholder="address" row="4"><br><br>
                    <label>Name of Degree Completed:</label><br>
                    <input type="text" name="degree"><br><br>
                     <label>CGPA:</label><br>
                     <input type="text" name="cgpa"><br><br>
                    <label>Course You Are Interested In:</label><br>
                    <input type="radio" name="course" value="python full stack">python full stack
                    <input type="radio" name="course" value="java full stack">java full stack
                    <input type="radio" name="course" value="mern full stack"> mern full stack
                    <br><br>
                    <label>Mode:</label><br>
                    <input type="radio" name="mode" value="Online"> Online
                    <input type="radio" name="mode" value="Offline"> Offline
                    <br><br>
                    <label>Convenient Location:</label><br>
                    <input type="radio" name="location" value="chennai"> chennai
                    <input type="radio" name="location" value="bangalore"> bangalore
                    <br><br>
                     <label>Payment Type:</label><br>
                    <input type="radio" name="payment" value="Cash"> Cash
                    <input type="radio" name="payment" value="Online"> Online Payment
                    <br><br>
                     <label>Upload Payment Screenshot:</label><br>
                     <input type="file" name="payment_screenshot"><br><br>
                
                      <input type="submit" value="Submit"><br><br>

                    </form>
                </center>
            </div>
        </section>
    </body>
</html>
