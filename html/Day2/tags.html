<!-- closing tags

A closing tag is used in HTML to mark the end of an element. It tells the browser where that element stops.

<html></html>   - Covers the whole HTML document.
<head></head>   - Contains page information like title and links.
<body></body>   - Contains the visible webpage content.
<title></title> - Sets the webpage title shown in the browser tab.
<h1></h1>       - Main heading.
<h2></h2>       - Subheading.
<h3></h3>       - Smaller subheading.
<h4></h4>       - Smaller section heading.
<h5></h5>       - Less important heading.
<h6></h6>       - Smallest heading.
<p></p>         - Paragraph text.
<div></div>     - Groups sections/content together.
<span></span>   - Groups small inline text/content.
<a></a>         - Creates a hyperlink.
<table></table> - Creates a table.
<tr></tr>       - Creates a table row.
<td></td>       - Creates a table cell.
<ul></ul>       - Unordered (bullet) list.
<ol></ol>       - Ordered (numbered) list.
<li></li>       - List item.


selfclosing tags

Self-closing tags in HTML are tags that don’t need a closing part because they don’t wrap content.

<br>     - Line break
<hr>     - Horizontal line
<img>    - Image
<input>  - Input field
<meta>   - Page information
<link>   - External file (CSS, etc.)


Empty tags 

Empty tags in HTML are tags that have no content inside them.They are also called void elements.

<br>     - Line break
<hr>     - Horizontal line
<img>    - Image
<input>  - Input field
<meta>   - Information about the page
<link>   - Links external files (like CSS)


-->
